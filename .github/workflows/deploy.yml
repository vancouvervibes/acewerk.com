name: Build and deploy site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for accurate per-file git log lastmod

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate sitemap.xml
        run: python scripts/generate_sitemap.py

      - name: Validate sitemap.xml against sitemap 0.9 XSD
        run: |
          set -euo pipefail
          SITEMAP="sitemap.xml"
          XSD_URL="https://www.sitemaps.org/schemas/sitemap/0.9/sitemap.xsd"
          XSD_FILE="/tmp/sitemap-0.9.xsd"

          if ! command -v xmllint >/dev/null 2>&1; then
            echo "Installing xmllint (libxml2-utils)"
            sudo apt-get update -qq
            sudo apt-get install -qq -y libxml2-utils >/dev/null
          fi

          echo "Fetching sitemap 0.9 XSD from ${XSD_URL}..."
          curl -fsSL -o "${XSD_FILE}" "${XSD_URL}"

          echo "Validating ${SITEMAP}..."
          xmllint --noout --schema "${XSD_FILE}" "${SITEMAP}"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
