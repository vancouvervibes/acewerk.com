    const inv=1-a, gr=a*0.18;
    for(let i=0;i<neonTiles.length;i++){ const t=neonTiles[i], o=t.o;
      const br=t.v?colArr[o]:baseCol[o], bg=t.v?colArr[o+1]:baseCol[o+1], bb=t.v?colArr[o+2]:baseCol[o+2];
      colArr[o]=c01(br*inv+NEON_R*a+gr); colArr[o+1]=c01(bg*inv+NEON_G*a); colArr[o+2]=c01(bb*inv+NEON_B*a);
    }
    const h=a*0.20;                                     // faint 1-tile bloom halo
    for(let i=0;i<neonHalo.length;i++){ const t=neonHalo[i], o=t.o;
      const br=t.v?colArr[o]:baseCol[o], bg=t.v?colArr[o+1]:baseCol[o+1], bb=t.v?colArr[o+2]:baseCol[o+2];
      colArr[o]=c01(br+h); colArr[o+1]=c01(bg+h*0.05); colArr[o+2]=c01(bb+h*0.10);
    }
  }

  // ---- cover-fit layout ----
  let DPR=1,tilePx=1,originX=0,originY=0,radius2=1,didInit=false;
  function layout(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    const w=Math.round(window.innerWidth*DPR), h=Math.round(window.innerHeight*DPR);
    canvas.width=w; canvas.height=h;
    canvas.style.width=window.innerWidth+'px'; canvas.style.height=window.innerHeight+'px';
    gl.viewport(0,0,w,h);
    tilePx=Math.max(w/COLS,h/ROWS);
    const desktop=window.matchMedia('(min-width:900px) and (pointer:fine)').matches;
    const availTop=(ROWS*tilePx - h)/2;                        // vertical overflow above centre
    const yOff=desktop ? Math.min(10*tilePx, Math.max(0,availTop)) : 0;
    originX=(w-COLS*tilePx)/2; originY=(h-ROWS*tilePx)/2 + yOff;
    const radius=tilePx*8.25; radius2=radius*radius;
    for(let k=0;k<N;k++){cx[k]=originX+(gridArr[k*2]+0.5)*tilePx; cy[k]=originY+(gridArr[k*2+1]+0.5)*tilePx;}
    gl.uniform2f(U.u_res,w,h); gl.uniform2f(U.u_origin,originX,originY);
    gl.uniform1f(U.u_tilePx,tilePx); gl.uniform1f(U.u_fill,0.87);   // thinner grout -> lighter feel
    gl.uniform1f(U.u_riseScale,0.20); gl.uniform1f(U.u_liftPx,tilePx*0.40);
    const sl=document.getElementById('screenlink');
    if(sl){
      sl.style.left  =((originX+DSPx0*tilePx)/DPR)+'px';
      sl.style.top   =((originY+DSPy0*tilePx)/DPR)+'px';
      sl.style.width =(((DSPx1-DSPx0+1)*tilePx)/DPR)+'px';
      sl.style.height=(((DSPy1-DSPy0+1)*tilePx)/DPR)+'px';
    }
    if(!didInit){pxv=w/2;pyv=h/2;didInit=true;}
  }
  window.addEventListener('resize',layout);

  // ---- pointer ----
  let pxv=0,pyv=0,active=false,lastInteract=-1;
  function setP(x,y){pxv=x*DPR;pyv=y*DPR;active=true;lastInteract=performance.now();if(hintEl&&!hintEl.classList.contains('gone'))hintEl.classList.add('gone');}
  function clrP(){active=false;}
  if(!reduceMotion){
    window.addEventListener('mousemove',e=>setP(e.clientX,e.clientY),{passive:true});
    window.addEventListener('mouseleave',clrP,{passive:true});
    window.addEventListener('touchstart',e=>{const t=e.touches[0];if(t)setP(t.clientX,t.clientY);},{passive:true});
    window.addEventListener('touchmove',e=>{const t=e.touches[0];if(t)setP(t.clientX,t.clientY);},{passive:true});
    window.addEventListener('touchend',clrP,{passive:true});
  }
  layout();

  const STIFF=0.16,DAMP=0.80;
  const RELEASE=0.04;                 // low = tiles fall back slowly, trailing the cursor
  const SCREEN_RISE=1.0, SCREEN_FALL=0.09;   // the whole screen lifts together like a button
  const SCREEN_STIFF=0.06, SCREEN_DAMP=0.88;  // gentle swell on rise (less abrupt than the radius hover)
  // --- auto-attract: while nobody is interacting, the screen performs its own "hover" so passive
  //     desktop viewers and mobile visitors see it lift + light up + spin without touching anything ---
  const ATTRACT_IDLE=2600;                     // ms of no pointer activity before the demo may play
  const ATTRACT_LEAD=2.2, ATTRACT_RELEAD=1.2;  // s of quiet before the first / next pulse
  const ATTRACT_RISE=1.0, ATTRACT_HOLD=1.4, ATTRACT_FALL=1.2, ATTRACT_GAP=4.5; // s, one pulse shape
  const ATTRACT_CYCLE=ATTRACT_RISE+ATTRACT_HOLD+ATTRACT_FALL+ATTRACT_GAP;
  let attractPhase=-ATTRACT_LEAD;              // seconds; negative = counting down the quiet lead-in
  let animT=0,lastNow=0,mon=0,neonT=0;   // animation phase + smoothed screen-hover amount + neon phase
  // a few warm embers that drift inside the center on hover
  const EMB=[]; for(let i=0;i<5;i++) EMB.push({r:2.4+Math.random()*5.2,a:Math.random()*6.283,sp:0.6+Math.random()*0.8,bob:0.5+Math.random()*0.9,ph:Math.random()*6.283,fl:1.6+Math.random()*1.8});
  function c01(x){return x<0?0:x>1?1:x;}

  function frame(now){
    if(!reduceMotion){
      let dt=lastNow?(now-lastNow)*0.001:0.016; lastNow=now; if(dt>0.05)dt=0.05;

      // is the cursor over the clickable screen?
      let overScreen=0;
      if(active){
        const sx0=originX+DSPx0*tilePx, sx1=originX+(DSPx1+1)*tilePx, sy0=originY+DSPy0*tilePx, sy1=originY+(DSPy1+1)*tilePx;
        if(pxv>=sx0&&pxv<=sx1&&pyv>=sy0&&pyv<=sy1) overScreen=1;
      }

      // auto-attract demo: runs only while the visitor is idle; any real pointer activity yields to them
      const idle=(lastInteract<0)||(now-lastInteract>ATTRACT_IDLE);
      if(idle) attractPhase+=dt; else attractPhase=-ATTRACT_RELEAD;
      let attract=0;
      if(attractPhase>=0){
        const tp=attractPhase%ATTRACT_CYCLE;
        if(tp<ATTRACT_RISE) attract=ss(tp/ATTRACT_RISE);
        else if(tp<ATTRACT_RISE+ATTRACT_HOLD) attract=1;
        else if(tp<ATTRACT_RISE+ATTRACT_HOLD+ATTRACT_FALL) attract=ss(1-(tp-ATTRACT_RISE-ATTRACT_HOLD)/ATTRACT_FALL);
      }
      const drive=overScreen>attract?overScreen:attract;   // 0..1 : real hover OR the attract pulse
      const liftTarget=SCREEN_RISE*drive;

      for(let k=0;k<N;k++){
        let target=0.0, fall=RELEASE, stiff=STIFF, damp=DAMP;
        if(isScreen[k]){                       // screen tiles lift together; drop only when the drive releases
          target=liftTarget; fall=SCREEN_FALL; stiff=SCREEN_STIFF; damp=SCREEN_DAMP;
        } else if(active && !overScreen){       // normal radius hover elsewhere (suppressed over the screen)
          const dx=cx[k]-pxv,dy=cy[k]-pyv,d2=dx*dx+dy*dy;
          if(d2<radius2){const t=1.0-Math.sqrt(d2/radius2); target=t*t*(3.0-2.0*t);}
        }
        let r=rise[k];
        if(target>r){ let v=vel[k]; v+=(target-r)*stiff; v*=damp; r+=v; if(r>1.15)r=1.15; vel[k]=v; }
        else { r+=(target-r)*fall; if(r<0)r=0; vel[k]=0; }
        rise[k]=r;
      }
      gl.bindBuffer(gl.ARRAY_BUFFER,rb); gl.bufferSubData(gl.ARRAY_BUFFER,0,rise);

      // spiral: always spinning; speeds up + adds drifting embers while driven (hover or attract)
      mon+=(drive-mon)*0.06;
      const speed=VSPEED*(1.0+mon*1.2);
      animT+=dt*speed;                          // integrate so speed changes stay smooth
      const gMul=1.0+mon*0.6, cyan=mon*0.22;      // brighter + cooler/cyan when driven
      // resting accretion glow: a steady blue disk-haze so the black hole reads as "alive" at rest.
      // hover/attract still wins clearly via brighter arms, cyan shift, a wider halo, embers, speed + lift.
      const haloR=0.02+mon*0.03, haloG=0.05+mon*0.11, haloB=0.16+mon*0.16;
      for(let j=0;j<vCount;j++){
        const phase=vTh[j]*VARMS+vR[j]*VPITCH - animT;
        let arm=0.5+0.5*Math.sin(phase); arm=(arm-0.18)/0.82; arm=arm<0?0:arm>1?1:arm;  // lifted floor -> arms read at rest
        const shape=vDisk[j]*vCore[j]*vAff[j];      // disk footprint: dark at the singularity, glowing in the ring
        const g=arm*shape*VSTR, o=vIdx[j]*3;
        colArr[o]  =c01(baseCol[o]  + g*0.10*gMul        + shape*haloR);
        colArr[o+1]=c01(baseCol[o+1]+ g*(0.42+cyan)*gMul + shape*haloG);
        colArr[o+2]=c01(baseCol[o+2]+ g*0.95*gMul        + shape*haloB);
      }
      if(mon>0.01){                              // subtle warm embers, hover only
        const te=now*0.001;
        for(let i=0;i<EMB.length;i++){
          const e=EMB[i], ang=e.a+animT*0.5*e.sp, rr=e.r+Math.sin(te*e.bob+e.ph)*1.2;
          const gxr=Math.round(VCX+Math.cos(ang)*rr), gyr=Math.round(VCY+Math.sin(ang)*rr-1.5);
          const idx=gyr*COLS+gxr;
          if(gxr<0||gxr>=COLS||gyr<0||gyr>=ROWS||!inCenter[idx]) continue;
          const flick=0.55+0.45*Math.sin(te*e.fl+e.ph), it=mon*flick*0.6, o=idx*3;
          colArr[o]=c01(colArr[o]+it*0.9); colArr[o+1]=c01(colArr[o+1]+it*0.45); colArr[o+2]=c01(colArr[o+2]+it*0.12);
        }
      }
      // --- ENTER neon sign: idle flicker, pulled to full by hover OR the attract pulse ---
      if(drive>0.55){ neonT=NEON_FULLSTART; }                 // hover/attract holds the "full display" point
      else { neonT+=dt; if(neonT>=NEON_CYCLE) neonT-=NEON_CYCLE; }
      let nEnv=overScreen?1.0:Math.max(neonEnv(neonT),attract);
      if(nEnv>0){ const buzz=0.94+0.06*(0.5+0.5*Math.sin(now*0.03)); nEnv*=buzz; }  // gentle tube shimmer while lit
      applyNeon(nEnv*(0.9+0.34*mon));                         // a touch brighter while driven

      gl.bindBuffer(gl.ARRAY_BUFFER,cb); gl.bufferSubData(gl.ARRAY_BUFFER,sliceStart*4,colArr.subarray(sliceStart,sliceEnd));
    }
    gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
    gl.bindVertexArray(vao); gl.drawArraysInstanced(gl.TRIANGLES,0,6,N);
    requestAnimationFrame(frame);
  }
  // reduced-motion: no flicker, but bake a steady sign once so the entry cue is still present
  if(reduceMotion){ applyNeon(0.95); gl.bindBuffer(gl.ARRAY_BUFFER,cb); gl.bufferSubData(gl.ARRAY_BUFFER,sliceStart*4,colArr.subarray(sliceStart,sliceEnd)); }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
